# Hermes Agent Configuration
# Copy to ~/.hermes/config.yaml and customize

model:
  default: glm-5-turbo
  # Replace with your preferred model:
  # - glm-5-turbo (Z.AI / GLM)
  # - claude-sonnet-4 (Anthropic)
  # - openai/gpt-4o (OpenAI via OpenRouter)

toolsets:
  - hermes-cli

agent:
  max_turns: 90
  gateway_timeout: 1800

terminal:
  backend: local
  cwd: ~/system/second-brain   # IMPORTANT: Set to your vault path
  timeout: 180
  persistent_shell: true

browser:
  inactivity_timeout: 120
  command_timeout: 30

discord:
  require_mention: true
  auto_thread: true
  reactions: true

memory:
  memory_enabled: true
  user_profile_enabled: true
  memory_char_limit: 2200
  user_char_limit: 1375

# MCP Servers
mcp_servers:
  playwright:
    command: npx
    args:
      - -y
      - '@playwright/mcp'
      - --headless
    timeout: 120

# Platform connections (set tokens via environment variables)
platforms:
  discord:
    enabled: true
